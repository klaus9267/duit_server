spring:
  profiles:
    active: ${PROFILE}

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 300000
      connection-timeout: 3000

  jpa:
    open-in-view: false  # OSIV 비활성화 — 컨트롤러에서 Lazy Loading 방지, 커넥션 풀 점유 최소화

  # 파일 업로드 크기 제한 설정
  servlet:
    multipart:
      max-file-size: 10MB      # 개별 파일 최대 크기
      max-request-size: 20MB   # 전체 요청 최대 크기

  output:
    ansi:
      enabled: always

  # Jackson 설정
  jackson:
    serialization:
      indent-output: true
    time-zone: Asia/Seoul

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: never
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: ${JWT_VALIDITY}

# Swagger 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    docExpansion: none
  cache:
    disabled: false  # 캐시 활성화
  enable-kotlin: true

discord:
  webhook:
    alarm:
      url: ${DISCORD_ALARM_WEBHOOK_URL}
    error-monitoring:
      url: ${DISCORD_ERROR_WEBHOOK_URL}

# Firebase 설정
firebase:
  web-api-key: ${FIREBASE_WEB_API_KEY}
  project-id: ${FIREBASE_PROJECT_ID}
  credentials-json: ${FIREBASE_KEY_JSON}

api:
  saramin:
    access-key: ${SARAMIN_ACCESS_KE:}
  work24:
    auth-key: ${WORK24_KEY}